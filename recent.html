<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar">

      <div style="padding:8px 8px 4px;display:flex;gap:6px">
        <button class="cmd-btn primary" style="flex:1;justify-content:center;gap:6px;font-size:13px" onclick="showToast('新建功能演示','info')">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          新建
        </button>
        <button class="cmd-btn" style="justify-content:center;gap:6px;font-size:13px;border:1px solid var(--border)" onclick="showToast('上传功能演示','info')">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
          上传
        </button>
      </div>
      <div class="nav-section-label" style="margin-top:8px">我的云盘</div>
      <a href="index.html" class="nav-item">
        <span class="nav-icon"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></span>
        我的文件
      </a>
      <a href="recent.html" class="nav-item active">
        <span class="nav-icon"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg></span>
        最近使用
      </a>
      <a href="photos.html" class="nav-item">
        <span class="nav-icon"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></span>
        照片
      </a>
      <div class="nav-item" onclick="showToast('收藏夹功能演示','info')">
        <span class="nav-icon"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>
        收藏夹
      </div>
      <div class="sidebar-divider"></div>
      <div class="nav-section-label">共享</div>
      <a href="shared.html" class="nav-item">

        与我共享
        <span class="nav-badge">6</span>
      </a>
      <div class="sidebar-divider"></div>
      <a href="trash.html" class="nav-item">
        <span class="nav-icon"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></span>
        回收站
        <span class="nav-badge" style="background:#d13438">4</span>

    <div class="sidebar-storage">
      <div>已使用 <strong>12.4 GB</strong> / 1 TB</div>
      <div class="storage-bar"><div class="storage-bar-fill" style="width:1.24%"></div></div>
      <div style="display:flex;justify-content:space-between"><span>还剩 987.6 GB</span><a href="#" style="color:var(--primary);font-size:11px">升级</a></div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="content-area">
    <div class="commandbar">
      <span style="font-size:13px;color:var(--text-secondary)">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        显示最近 7 天内访问的文件
      </span>
      <div class="commandbar-right">
        <button class="cmd-btn" onclick="showToast('筛选时间范围','info')">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
          筛选
        </button>
      </div>
    </div>

    <div class="breadcrumb">
      <span class="breadcrumb-item" onclick="window.location='index.html'">我的云盘</span>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-item current">最近使用</span>
    </div>

    <div class="file-view">
      <div class="list-header" style="grid-template-columns:2fr 1fr 100px 80px">
        <span>名称</span>
        <span>访问时间</span>
        <span>大小</span>
        <span></span>
      </div>
      <div id="recentList" class="file-list"></div>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div id="shareModal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal('shareModal')">
  <div class="modal">
    <div class="modal-header">
      <h2>共享 "<span id="shareModalFileName"></span>"</h2>
      <button class="modal-close" onclick="closeModal('shareModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">邀请协作者</label>
        <input class="form-input" type="text" placeholder="输入邮箱地址或姓名">
      </div>
      <div style="margin-top:12px">
        <label class="form-label">共享链接</label>
        <div class="share-link-box">
          <input class="share-link-input" type="text" readonly value="https://clouddrive.example.com/share/abc123xyz">
          <button class="btn btn-primary" onclick="copyShareLink()">复制</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('shareModal')">关闭</button>
      <button class="btn btn-primary" onclick="closeModal('shareModal');showToast('共享设置已保存','success')">保存</button>
    </div>
  </div>
</div>

<!-- Rename Modal -->
<div id="renameModal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal('renameModal')">
  <div class="modal">
    <div class="modal-header"><h2>重命名</h2><button class="modal-close" onclick="closeModal('renameModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">新名称</label>
        <input class="form-input" id="renameInput" type="text" onkeydown="if(event.key==='Enter')doRename()">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('renameModal')">取消</button>
      <button class="btn btn-primary" onclick="doRename()">确认</button>
    </div>
  </div>
</div>

<div id="deleteConfirmModal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal('deleteConfirmModal')">
  <div class="modal">
    <div class="modal-header"><h2>删除文件</h2><button class="modal-close" onclick="closeModal('deleteConfirmModal')">✕</button></div>
    <div class="modal-body">
      <p>确定要将 "<strong id="deleteFileName"></strong>" 移至回收站吗？</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('deleteConfirmModal')">取消</button>
      <button class="btn btn-danger" onclick="doDelete()">移至回收站</button>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script src="js/app.js"></script>
</body>
</html>
